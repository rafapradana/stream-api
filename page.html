<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Stream Viewer</title>
    <style>
        :root {
            --bg: #09090b;
            --bg-raised: #18181b;
            --bg-hover: #27272a;
            --border: #27272a;
            --border-subtle: #18181b;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --text-faint: #52525b;
            --text-dim: #3f3f46;
            --text-strong: #d4d4d8;
            --accent: #22c55e;
            --accent-dim: rgba(34, 197, 94, 0.06);
            --info: #3b82f6;
            --warning: #eab308;
            --error: #ef4444;
            --glow: rgba(34, 197, 94, 0.12);
            --scrollbar: #27272a;
            --scrollbar-hover: #3f3f46;
            --theme-icon: "sun";
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --bg-raised: #f4f4f5;
            --bg-hover: #e4e4e7;
            --border: #e4e4e7;
            --border-subtle: #f4f4f5;
            --text: #09090b;
            --text-secondary: #52525b;
            --text-muted: #71717a;
            --text-faint: #a1a1aa;
            --text-dim: #d4d4d8;
            --text-strong: #27272a;
            --accent: #16a34a;
            --accent-dim: rgba(22, 163, 74, 0.06);
            --info: #2563eb;
            --warning: #ca8a04;
            --error: #dc2626;
            --glow: rgba(22, 163, 74, 0.10);
            --scrollbar: #d4d4d8;
            --scrollbar-hover: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background 0.2s, color 0.2s;
        }

        header {
            padding: 14px 24px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        #status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-faint);
            transition: background 0.3s;
        }

        #status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
        #status-dot.streaming  { background: var(--accent); animation: pulse 1s infinite; }
        #status-dot.complete   { background: var(--info); }
        #status-dot.error      { background: var(--error); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        #counter {
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        #counter span {
            color: var(--text);
            font-weight: 500;
        }

        #actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        button {
            padding: 5px 10px;
            font-size: 12px;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-raised);
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        button:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        #btn-theme {
            padding: 5px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-theme svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #btn-theme .icon-sun { display: none; }
        #btn-theme .icon-moon { display: none; }

        [data-theme="dark"] #btn-theme .icon-sun { display: block; }
        [data-theme="light"] #btn-theme .icon-moon { display: block; }

        #table-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        #table-container::-webkit-scrollbar {
            width: 6px;
        }

        #table-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #table-container::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 3px;
        }

        #table-container::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        th {
            background: var(--bg);
            padding: 10px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-faint);
            border-bottom: 1px solid var(--border);
        }

        th:nth-child(1) { width: 80px; }
        th:nth-child(2) { width: 80px; }
        th:nth-child(3) { width: 20%; }
        th:nth-child(4) { width: 20%; }
        th:nth-child(5) { width: 120px; }
        th:nth-child(6) { width: 100px; }

        td {
            padding: 7px 16px;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }

        tr.glow td {
            background: var(--glow);
            transition: background 0.6s ease-out;
        }

        tr:hover td {
            background: var(--bg-raised);
            color: var(--text);
        }

        td:first-child { color: var(--text); font-weight: 500; }
        td:nth-child(3),
        td:nth-child(4) { color: var(--text-strong); }

        #empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--text-dim);
            font-size: 14px;
            gap: 10px;
        }

        #empty-state svg {
            width: 36px;
            height: 36px;
            stroke: var(--border);
        }

        #progress-bar-container {
            height: 2px;
            background: var(--border-subtle);
            flex-shrink: 0;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        #progress-bar.done {
            width: 100%;
            background: var(--info);
        }
    </style>
</head>
<body>
    <header>
        <h1>SSE Stream Viewer</h1>
        <div id="status-bar">
            <div id="status-indicator">
                <div id="status-dot" class="connecting"></div>
                <span id="status-text">Connecting...</span>
            </div>
            <div id="counter">Received: <span id="count">0</span></div>
            <div id="actions">
                <button id="btn-theme" title="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
                </button>
                <button id="btn-scroll" title="Auto-scroll to bottom">Auto-scroll: ON</button>
                <button id="btn-reconnect" style="display:none;">Reconnect</button>
            </div>
        </div>
    </header>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <div id="table-container">
        <table>
            <thead>
                <tr>
                    <th>PK</th>
                    <th>SK</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>DOB</th>
                    <th>Zipcode</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr id="empty-row">
                    <td colspan="6">
                        <div id="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 6v6l4 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Waiting for stream data...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const html = document.documentElement;
        const tbody = document.getElementById('tbody');
        const countEl = document.getElementById('count');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const btnTheme = document.getElementById('btn-theme');
        const btnScroll = document.getElementById('btn-scroll');
        const btnReconnect = document.getElementById('btn-reconnect');
        const tableContainer = document.getElementById('table-container');

        const MAX_VISIBLE = 500;
        let totalCount = 0;
        let autoScroll = true;
        let evtSource = null;
        let pendingRows = [];
        let rafId = null;

        // Theme toggle
        const saved = localStorage.getItem('theme');
        if (saved) {
            html.setAttribute('data-theme', saved);
        }

        btnTheme.addEventListener('click', function() {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        function setStatus(state, text) {
            statusDot.className = state;
            statusText.textContent = text;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function flushRows() {
            if (pendingRows.length === 0) return;
            const fragment = document.createDocumentFragment();
            for (const row of pendingRows) {
                const tr = document.createElement('tr');
                tr.innerHTML =
                    `<td>${escapeHtml(String(row.pk))}</td>` +
                    `<td>${escapeHtml(String(row.sk))}</td>` +
                    `<td>${escapeHtml(row.fname)}</td>` +
                    `<td>${escapeHtml(row.lname)}</td>` +
                    `<td>${escapeHtml(row.dob)}</td>` +
                    `<td>${escapeHtml(row.zipcode)}</td>`;
                fragment.appendChild(tr);
            }
            tbody.appendChild(fragment);
            pendingRows = [];

            while (tbody.children.length > MAX_VISIBLE) {
                tbody.removeChild(tbody.firstChild);
            }

            const lastRow = tbody.lastElementChild;
            if (lastRow) {
                lastRow.classList.add('glow');
                setTimeout(function() {
                    lastRow.classList.remove('glow');
                }, 600);
            }

            if (autoScroll) {
                tableContainer.scrollTop = tableContainer.scrollHeight;
            }
        }

        function onMessage(event) {
            const row = JSON.parse(event.data);
            totalCount++;
            pendingRows.push(row);
            countEl.textContent = totalCount.toLocaleString();

            if (statusDot.className !== 'streaming') {
                setStatus('streaming', 'Streaming...');
            }

            if (!rafId) {
                rafId = requestAnimationFrame(function() {
                    flushRows();
                    rafId = null;
                });
            }
        }

        function startStream() {
            if (evtSource) evtSource.close();
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            totalCount = 0;
            pendingRows = [];
            countEl.textContent = '0';
            tbody.innerHTML = '';
            progressBar.style.width = '0%';
            progressBar.classList.remove('done');
            btnReconnect.style.display = 'none';

            setStatus('connecting', 'Connecting...');
            evtSource = new EventSource('/stream');

            evtSource.onmessage = onMessage;

            evtSource.onerror = function() {
                evtSource.close();
                if (pendingRows.length > 0) flushRows();
                setStatus('complete', 'Stream complete');
                progressBar.classList.add('done');
                progressBar.style.width = '100%';
                btnReconnect.style.display = '';
            };
        }

        btnScroll.addEventListener('click', function() {
            autoScroll = !autoScroll;
            btnScroll.textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
            if (autoScroll) {
                tableContainer.scrollTop = tableContainer.scrollHeight;
            }
        });

        btnReconnect.addEventListener('click', function() {
            startStream();
        });

        tableContainer.addEventListener('scroll', function() {
            const atBottom = tableContainer.scrollHeight - tableContainer.scrollTop - tableContainer.clientHeight < 50;
            if (!atBottom && autoScroll) {
                autoScroll = false;
                btnScroll.textContent = 'Auto-scroll: OFF';
            }
        });

        startStream();
    </script>
</body>
</html>
