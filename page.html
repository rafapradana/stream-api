<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Stream Viewer</title>
    <style>
        :root {
            --bg: #09090b;
            --bg-raised: #18181b;
            --bg-hover: #27272a;
            --border: #27272a;
            --border-subtle: #18181b;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --text-faint: #52525b;
            --text-dim: #3f3f46;
            --text-strong: #d4d4d8;
            --accent: #22c55e;
            --accent-dim: rgba(34, 197, 94, 0.06);
            --info: #3b82f6;
            --warning: #eab308;
            --error: #ef4444;
            --glow: rgba(34, 197, 94, 0.12);
            --scrollbar: #27272a;
            --scrollbar-hover: #3f3f46;
            --input-bg: #18181b;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --bg-raised: #f4f4f5;
            --bg-hover: #e4e4e7;
            --border: #e4e4e7;
            --border-subtle: #f4f4f5;
            --text: #09090b;
            --text-secondary: #52525b;
            --text-muted: #71717a;
            --text-faint: #a1a1aa;
            --text-dim: #d4d4d8;
            --text-strong: #27272a;
            --accent: #16a34a;
            --accent-dim: rgba(22, 163, 74, 0.06);
            --info: #2563eb;
            --warning: #ca8a04;
            --error: #dc2626;
            --glow: rgba(22, 163, 74, 0.10);
            --scrollbar: #d4d4d8;
            --scrollbar-hover: #a1a1aa;
            --input-bg: #f4f4f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background 0.2s, color 0.2s;
        }

        /* Header */
        header {
            padding: 12px 24px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 16px;
        }

        header h1 {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        #status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        #status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-faint);
            transition: background 0.3s;
        }

        #status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
        #status-dot.streaming  { background: var(--accent); animation: pulse 1s infinite; }
        #status-dot.paused     { background: var(--warning); }
        #status-dot.complete   { background: var(--info); }
        #status-dot.error      { background: var(--error); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        #counter {
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        #counter span { color: var(--text); font-weight: 500; }

        #stats {
            color: var(--text-dim);
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        #stats span { color: var(--text-muted); }

        /* Actions */
        #actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        button {
            padding: 5px 10px;
            font-size: 12px;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-raised);
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        button:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        button.active {
            background: var(--bg-hover);
            border-color: var(--text-faint);
            color: var(--text);
        }

        .icon-btn {
            padding: 5px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Theme toggle */
        #btn-theme .icon-sun { display: none; }
        #btn-theme .icon-moon { display: none; }
        [data-theme="dark"] #btn-theme .icon-sun { display: block; }
        [data-theme="light"] #btn-theme .icon-moon { display: block; }

        /* Search */
        #search-container {
            position: relative;
        }

        #search-input {
            padding: 5px 10px 5px 28px;
            font-size: 12px;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text);
            width: 180px;
            outline: none;
            transition: border-color 0.15s, width 0.2s;
        }

        #search-input:focus {
            border-color: var(--text-faint);
            width: 220px;
        }

        #search-input::placeholder {
            color: var(--text-dim);
        }

        #search-icon {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 13px;
            height: 13px;
            stroke: var(--text-dim);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        #search-count {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: var(--text-dim);
            pointer-events: none;
        }

        /* Layout */
        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Table */
        #table-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        #table-container::-webkit-scrollbar { width: 6px; }
        #table-container::-webkit-scrollbar-track { background: transparent; }
        #table-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
        #table-container::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        th {
            background: var(--bg);
            padding: 10px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-faint);
            border-bottom: 1px solid var(--border);
        }

        th:nth-child(1) { width: 80px; }
        th:nth-child(2) { width: 80px; }
        th:nth-child(3) { width: 20%; }
        th:nth-child(4) { width: 20%; }
        th:nth-child(5) { width: 120px; }
        th:nth-child(6) { width: 100px; }

        td {
            padding: 7px 16px;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            border-bottom: 1px solid var(--border-subtle);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }

        tr { cursor: pointer; }

        tr.glow td {
            background: var(--glow);
            transition: background 0.6s ease-out;
        }

        tr:hover td {
            background: var(--bg-raised);
            color: var(--text);
        }

        tr.selected td {
            background: var(--bg-hover);
            color: var(--text);
        }

        td:first-child { color: var(--text); font-weight: 500; }
        td:nth-child(3),
        td:nth-child(4) { color: var(--text-strong); }

        .hidden-row { display: none; }

        mark {
            background: rgba(234, 179, 8, 0.3);
            color: inherit;
            border-radius: 2px;
            padding: 0 1px;
        }

        /* Empty state */
        #empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--text-dim);
            font-size: 14px;
            gap: 10px;
        }

        #empty-state svg {
            width: 36px;
            height: 36px;
            stroke: var(--border);
        }

        /* Progress bar */
        #progress-bar-container {
            height: 2px;
            background: var(--border-subtle);
            flex-shrink: 0;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        #progress-bar.done {
            width: 100%;
            background: var(--info);
        }

        /* Detail panel */
        #detail-panel {
            width: 0;
            overflow: hidden;
            border-left: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
            transition: width 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        #detail-panel.open {
            width: 300px;
        }

        #detail-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #detail-header span {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }

        #btn-close-detail {
            padding: 2px 6px;
            font-size: 16px;
            line-height: 1;
            border: none;
            background: transparent;
            color: var(--text-dim);
        }

        #btn-close-detail:hover {
            color: var(--text);
            background: transparent;
        }

        #detail-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .detail-field {
            margin-bottom: 16px;
        }

        .detail-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            color: var(--text);
            word-break: break-all;
        }

        .detail-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            font-size: 13px;
        }

        /* Keyboard hint */
        #kbd-hints {
            position: fixed;
            bottom: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        body:hover #kbd-hints {
            opacity: 1;
        }

        kbd {
            padding: 1px 5px;
            font-family: inherit;
            font-size: 11px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-raised);
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header>
        <h1>SSE Stream Viewer</h1>
        <div id="status-bar">
            <div id="status-indicator">
                <div id="status-dot" class="connecting"></div>
                <span id="status-text">Connecting...</span>
            </div>
            <div id="counter">Received: <span id="count">0</span></div>
            <div id="stats"></div>
        </div>
        <div id="actions">
            <div id="search-container">
                <svg id="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input id="search-input" type="text" placeholder="Search... (F)" spellcheck="false" autocomplete="off">
                <span id="search-count"></span>
            </div>
            <button id="btn-pause" class="icon-btn" title="Pause (Space)">
                <svg class="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                <svg class="icon-play" viewBox="0 0 24 24" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <button id="btn-export" title="Export CSV">
                <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button id="btn-theme" class="icon-btn" title="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
            </button>
            <button id="btn-scroll" class="active" title="Auto-scroll">Auto-scroll: ON</button>
            <button id="btn-reconnect" style="display:none;">Reconnect</button>
        </div>
    </header>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    <div id="main">
        <div id="table-container">
            <table>
                <thead>
                    <tr>
                        <th>PK</th>
                        <th>SK</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>DOB</th>
                        <th>Zipcode</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr id="empty-row">
                        <td colspan="6">
                            <div id="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 6v6l4 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                Waiting for stream data...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="detail-panel">
            <div id="detail-header">
                <span>Detail</span>
                <button id="btn-close-detail">&times;</button>
            </div>
            <div id="detail-body">
                <div class="detail-empty">Click a row to view details</div>
            </div>
        </div>
    </div>
    <div id="kbd-hints">
        <span><kbd>Space</kbd> pause</span>
        <span><kbd>F</kbd> search</span>
        <span><kbd>R</kbd> reconnect</span>
        <span><kbd>D</kbd> detail panel</span>
    </div>

    <script>
        const html = document.documentElement;
        const tbody = document.getElementById('tbody');
        const countEl = document.getElementById('count');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const statsEl = document.getElementById('stats');
        const searchInput = document.getElementById('search-input');
        const searchCountEl = document.getElementById('search-count');
        const btnPause = document.getElementById('btn-pause');
        const btnExport = document.getElementById('btn-export');
        const btnTheme = document.getElementById('btn-theme');
        const btnScroll = document.getElementById('btn-scroll');
        const btnReconnect = document.getElementById('btn-reconnect');
        const tableContainer = document.getElementById('table-container');
        const detailPanel = document.getElementById('detail-panel');
        const detailBody = document.getElementById('detail-body');
        const btnCloseDetail = document.getElementById('btn-close-detail');

        const MAX_VISIBLE = 500;
        let allRows = [];
        let visibleCount = 0;
        let totalCount = 0;
        let autoScroll = true;
        let evtSource = null;
        let pendingRows = [];
        let rafId = null;
        let isPaused = false;
        let startTime = null;
        let statsTimer = null;
        let searchQuery = '';
        let selectedRowEl = null;

        // Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) html.setAttribute('data-theme', savedTheme);

        btnTheme.addEventListener('click', function() {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // Status
        function setStatus(state, text) {
            statusDot.className = state;
            statusText.textContent = text;
        }

        // Stats
        function updateStats() {
            if (!startTime) return;
            const elapsed = (Date.now() - startTime) / 1000;
            const rate = elapsed > 0 ? Math.round(totalCount / elapsed) : 0;
            const m = Math.floor(elapsed / 60);
            const s = Math.floor(elapsed % 60);
            const timeStr = m > 0 ? `${m}m ${s}s` : `${s}s`;
            statsEl.innerHTML = `<span>${rate}/sec</span> &middot; ${timeStr}`;
        }

        function startStats() {
            startTime = Date.now();
            if (statsTimer) clearInterval(statsTimer);
            statsTimer = setInterval(updateStats, 500);
        }

        function stopStats() {
            if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
            updateStats();
        }

        // Escape HTML
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function highlightMatch(text, query) {
            if (!query) return escapeHtml(text);
            const escaped = escapeHtml(text);
            const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escaped.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
        }

        function rowMatchesSearch(row, query) {
            if (!query) return true;
            const q = query.toLowerCase();
            return String(row.pk).includes(q) ||
                   String(row.sk).includes(q) ||
                   row.fname.toLowerCase().includes(q) ||
                   row.lname.toLowerCase().includes(q) ||
                   row.dob.includes(q) ||
                   row.zipcode.includes(q);
        }

        // Flush rows
        function flushRows() {
            if (pendingRows.length === 0) return;
            const fragment = document.createDocumentFragment();
            for (const row of pendingRows) {
                const tr = document.createElement('tr');
                const matches = rowMatchesSearch(row, searchQuery);
                if (!matches && searchQuery) tr.classList.add('hidden-row');

                tr.innerHTML =
                    `<td>${highlightMatch(String(row.pk), searchQuery)}</td>` +
                    `<td>${highlightMatch(String(row.sk), searchQuery)}</td>` +
                    `<td>${highlightMatch(row.fname, searchQuery)}</td>` +
                    `<td>${highlightMatch(row.lname, searchQuery)}</td>` +
                    `<td>${highlightMatch(row.dob, searchQuery)}</td>` +
                    `<td>${highlightMatch(row.zipcode, searchQuery)}</td>`;
                tr.addEventListener('click', function() { selectRow(row, tr); });
                fragment.appendChild(tr);
            }
            tbody.appendChild(fragment);
            pendingRows = [];

            while (tbody.children.length > MAX_VISIBLE) {
                tbody.removeChild(tbody.firstChild);
            }

            const lastRow = tbody.lastElementChild;
            if (lastRow && !lastRow.classList.contains('hidden-row')) {
                lastRow.classList.add('glow');
                setTimeout(function() { lastRow.classList.remove('glow'); }, 600);
            }

            if (searchQuery) updateSearchCount();
            if (autoScroll) tableContainer.scrollTop = tableContainer.scrollHeight;
        }

        // Row selection & detail
        function selectRow(row, trEl) {
            if (selectedRowEl) selectedRowEl.classList.remove('selected');
            trEl.classList.add('selected');
            selectedRowEl = trEl;
            showDetail(row);
        }

        function showDetail(row) {
            detailPanel.classList.add('open');
            detailBody.innerHTML =
                `<div class="detail-field"><div class="detail-label">Primary Key</div><div class="detail-value">${escapeHtml(String(row.pk))}</div></div>` +
                `<div class="detail-field"><div class="detail-label">Sort Key</div><div class="detail-value">${escapeHtml(String(row.sk))}</div></div>` +
                `<div class="detail-field"><div class="detail-label">First Name</div><div class="detail-value">${escapeHtml(row.fname)}</div></div>` +
                `<div class="detail-field"><div class="detail-label">Last Name</div><div class="detail-value">${escapeHtml(row.lname)}</div></div>` +
                `<div class="detail-field"><div class="detail-label">Date of Birth</div><div class="detail-value">${escapeHtml(row.dob)}</div></div>` +
                `<div class="detail-field"><div class="detail-label">Zipcode</div><div class="detail-value">${escapeHtml(row.zipcode)}</div></div>`;
        }

        btnCloseDetail.addEventListener('click', function() {
            detailPanel.classList.remove('open');
            if (selectedRowEl) { selectedRowEl.classList.remove('selected'); selectedRowEl = null; }
        });

        // Search
        function updateSearchCount() {
            const visible = tbody.querySelectorAll('tr:not(.hidden-row)').length;
            searchCountEl.textContent = searchQuery ? `${visible}/${totalCount}` : '';
        }

        function applySearch() {
            searchQuery = searchInput.value.trim().toLowerCase();
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(function(tr) {
                if (!tr.querySelector('td')) return;
                const cells = tr.querySelectorAll('td');
                const row = {
                    pk: cells[0].textContent,
                    sk: cells[1].textContent,
                    fname: cells[2].textContent,
                    lname: cells[3].textContent,
                    dob: cells[4].textContent,
                    zipcode: cells[5].textContent,
                };
                const matches = rowMatchesSearch(row, searchQuery);
                tr.classList.toggle('hidden-row', !matches);
            });
            updateSearchCount();
        }

        searchInput.addEventListener('input', applySearch);

        // SSE message handler
        function onMessage(event) {
            const row = JSON.parse(event.data);
            allRows.push(row);
            totalCount++;
            pendingRows.push(row);
            countEl.textContent = totalCount.toLocaleString();

            if (statusDot.className !== 'streaming' && !isPaused) {
                setStatus('streaming', 'Streaming...');
            }

            if (!rafId) {
                rafId = requestAnimationFrame(function() {
                    flushRows();
                    rafId = null;
                });
            }
        }

        // Start stream
        function startStream() {
            if (evtSource) evtSource.close();
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            allRows = [];
            totalCount = 0;
            pendingRows = [];
            isPaused = false;
            countEl.textContent = '0';
            tbody.innerHTML = '';
            progressBar.style.width = '0%';
            progressBar.classList.remove('done');
            btnReconnect.style.display = 'none';
            btnPause.querySelector('.icon-pause').style.display = '';
            btnPause.querySelector('.icon-play').style.display = 'none';
            searchInput.value = '';
            searchQuery = '';
            searchCountEl.textContent = '';

            setStatus('connecting', 'Connecting...');
            startStats();

            evtSource = new EventSource('/stream');
            evtSource.onmessage = onMessage;
            evtSource.onerror = function() {
                evtSource.close();
                if (pendingRows.length > 0) flushRows();
                setStatus('complete', 'Stream complete');
                progressBar.classList.add('done');
                progressBar.style.width = '100%';
                btnReconnect.style.display = '';
                stopStats();
            };
        }

        // Pause/Resume
        btnPause.addEventListener('click', togglePause);

        function togglePause() {
            if (!evtSource || evtSource.readyState === EventSource.CLOSED) return;
            if (!isPaused) {
                evtSource.close();
                isPaused = true;
                setStatus('paused', 'Paused');
                btnPause.querySelector('.icon-pause').style.display = 'none';
                btnPause.querySelector('.icon-play').style.display = '';
                stopStats();
            } else {
                // Resume: reconnect and skip already-received rows
                const skip = totalCount;
                evtSource = new EventSource('/stream');
                let skipped = 0;
                evtSource.onmessage = function(event) {
                    skipped++;
                    if (skipped <= skip) return;
                    onMessage(event);
                };
                evtSource.onerror = function() {
                    if (isPaused) return;
                    evtSource.close();
                    if (pendingRows.length > 0) flushRows();
                    setStatus('complete', 'Stream complete');
                    progressBar.classList.add('done');
                    progressBar.style.width = '100%';
                    btnReconnect.style.display = '';
                    stopStats();
                };
                isPaused = false;
                setStatus('streaming', 'Streaming...');
                btnPause.querySelector('.icon-pause').style.display = '';
                btnPause.querySelector('.icon-play').style.display = 'none';
                startStats();
            }
        }

        // Export CSV
        btnExport.addEventListener('click', function() {
            if (allRows.length === 0) return;
            let csv = 'pk,sk,fname,lname,dob,zipcode\n';
            for (const r of allRows) {
                csv += `${r.pk},${r.sk},"${r.fname}","${r.lname}",${r.dob},${r.zipcode}\n`;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'stream-data.csv';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Auto-scroll
        btnScroll.addEventListener('click', function() {
            autoScroll = !autoScroll;
            btnScroll.textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
            btnScroll.classList.toggle('active', autoScroll);
            if (autoScroll) tableContainer.scrollTop = tableContainer.scrollHeight;
        });

        btnReconnect.addEventListener('click', startStream);

        tableContainer.addEventListener('scroll', function() {
            const atBottom = tableContainer.scrollHeight - tableContainer.scrollTop - tableContainer.clientHeight < 50;
            if (!atBottom && autoScroll) {
                autoScroll = false;
                btnScroll.textContent = 'Auto-scroll: OFF';
                btnScroll.classList.remove('active');
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.target === searchInput) {
                if (e.key === 'Escape') {
                    searchInput.blur();
                    searchInput.value = '';
                    applySearch();
                }
                return;
            }
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                togglePause();
            } else if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                searchInput.focus();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                startStream();
            } else if (e.key === 'd' || e.key === 'D') {
                e.preventDefault();
                detailPanel.classList.toggle('open');
            }
        });

        startStream();
    </script>
</body>
</html>
